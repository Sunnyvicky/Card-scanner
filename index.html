<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SnapCard AI - 專業人脈管家</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="SnapCard">
    <meta name="theme-color" content="#f0f4ff">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon-precomposed" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%23f0f4ff'/%3E%3Crect x='30' y='45' width='120' height='90' rx='12' fill='%231e3a8a'/%3E%3Ccircle cx='90' cy='90' r='20' fill='%23f59e0b'/%3E%3C/svg%3E">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23f0f4ff'/%3E%3Crect x='5' y='7' width='22' height='16' rx='2' fill='%231e3a8a'/%3E%3Ccircle cx='16' cy='15' r='3.5' fill='%23f59e0b'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg:           #eef2fb;
            --surface:      #ffffff;
            --surface2:     #f8faff;
            --border:       #e2e8f5;
            --border-focus: #bfdbfe;
            --text:         #0f172a;
            --text2:        #475569;
            --text3:        #94a3b8;
            --accent:       #2563eb;
            --accent-bg:    #eff6ff;
            --accent-lt:    #bfdbfe;
            --orange:       #f97316;
            --green:        #059669;
            --green-bg:     #ecfdf5;
            --green-border: #a7f3d0;
            --red:          #dc2626;
            --red-bg:       #fef2f2;
            --red-border:   #fecaca;
        }
        *, *::before, *::after { box-sizing: border-box; }
        body {
            background: var(--bg); color: var(--text); margin: 0;
            overflow-x: hidden; -webkit-tap-highlight-color: transparent;
            font-family: 'Sora', sans-serif;
        }
        .no-scroll::-webkit-scrollbar { display: none; }
        .no-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        video { position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:10; }

        @keyframes scan {
            0%   { top:0%;   opacity:0; }
            10%  { opacity:1; }
            90%  { opacity:1; }
            100% { top:100%; opacity:0; }
        }
        .scan-line {
            position:absolute;left:0;width:100%;height:2px;
            background:linear-gradient(90deg,transparent,#f97316,transparent);
            box-shadow:0 0 14px #f97316;
            animation:scan 2s ease-in-out infinite;
        }
        @keyframes fadeUp   { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:none} }
        @keyframes fadeIn   { from{opacity:0} to{opacity:1} }
        @keyframes cardIn   { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
        @keyframes shimmer  { 0%{background-position:-200% center} 100%{background-position:200% center} }
        @keyframes spin     { to{transform:rotate(360deg)} }
        @keyframes float    { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }

        /* ── Splash ──────────────────────────────────────────── */
        .splash {
            position:fixed;inset:0;z-index:99999;
            background:linear-gradient(150deg,#1e3a8a 0%,#1e40af 50%,#0f172a 100%);
            display:flex;flex-direction:column;align-items:center;justify-content:center;
        }

        /* ── Header ──────────────────────────────────────────── */
        .hdr {
            padding:52px 20px 14px;
            background:rgba(240,244,255,0.94);
            border-bottom:1px solid var(--border);
            backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
            display:flex;justify-content:space-between;align-items:center;
            flex-shrink:0;z-index:10;
        }
        .hdr-title {
            font-size:22px;font-weight:800;letter-spacing:-0.5px;
            background:linear-gradient(120deg,#1e3a8a,#2563eb,#60a5fa);
            background-size:200% auto;
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
            animation:shimmer 5s linear infinite;
        }
        .hdr-btn {
            width:38px;height:38px;border-radius:12px;
            background:var(--surface2);border:1px solid var(--border);
            display:flex;align-items:center;justify-content:center;
            color:var(--text3);transition:all .2s;cursor:pointer;
        }
        .hdr-btn:hover { background:var(--accent-bg);border-color:var(--accent-lt);color:var(--accent); }

        /* ── Search ──────────────────────────────────────────── */
        .search-box {
            background:var(--surface);border:1px solid var(--border);border-radius:14px;
            display:flex;align-items:center;padding:0 14px;height:46px;
            transition:border-color .2s,box-shadow .2s;
        }
        .search-box:focus-within { border-color:var(--accent-lt);box-shadow:0 0 0 3px rgba(37,99,235,.07); }
        .search-box input { flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:14px;font-family:'Sora',sans-serif; }
        .search-box input::placeholder { color:var(--text3); }

        /* ── Contact card ────────────────────────────────────── */
        .card {
            background:var(--surface);border:1px solid var(--border);border-radius:16px;
            padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;
            transition:box-shadow .2s,border-color .2s,transform .15s;
            animation:cardIn .35s ease both;
        }
        .card:active { transform:scale(0.985);box-shadow:0 2px 8px rgba(0,0,0,.07); }

        /* ── Avatar: white bg + blue initial ─────────────────── */
        .avi {
            width:48px;height:48px;border-radius:14px;flex-shrink:0;
            background:var(--accent-bg);border:1.5px solid var(--accent-lt);
            display:flex;align-items:center;justify-content:center;
            font-size:18px;font-weight:800;color:var(--accent);font-family:'Sora',sans-serif;
        }

        /* ── Category chip ───────────────────────────────────── */
        .chip {
            display:inline-flex;align-items:center;gap:5px;
            padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;
            font-family:'Sora',sans-serif;
        }

        /* ── Section card ────────────────────────────────────── */
        .sec { background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:20px; }

        /* ── Field row ───────────────────────────────────────── */
        .field-row {
            background:var(--surface2);border:1px solid var(--border);border-radius:12px;
            padding:10px 14px;display:flex;align-items:center;gap:12;
            transition:border-color .2s,background .2s;
        }
        .field-row:focus-within { border-color:var(--accent-lt);background:var(--accent-bg); }
        .field-row input {
            flex:1;background:transparent;border:none;outline:none;
            color:var(--text);font-size:13px;font-family:'Sora',sans-serif;min-width:0;
        }

        /* ── Input ───────────────────────────────────────────── */
        .inp {
            background:var(--surface2);border:1px solid var(--border);
            color:var(--text);font-family:'Sora',sans-serif;border-radius:12px;
            transition:border-color .2s,box-shadow .2s;
        }
        .inp:focus { outline:none;border-color:var(--accent-lt);box-shadow:0 0 0 3px rgba(37,99,235,.07); }
        .inp::placeholder { color:var(--text3); }

        /* ── Buttons ─────────────────────────────────────────── */
        .btn-primary {
            background:linear-gradient(135deg,#2563eb,#1d4ed8);color:white;
            border:none;border-radius:14px;padding:14px;font-size:14px;font-weight:700;
            font-family:'Sora',sans-serif;
            box-shadow:0 4px 16px rgba(37,99,235,.28);
            transition:transform .15s,box-shadow .15s;cursor:pointer;
        }
        .btn-primary:active { transform:scale(0.97);box-shadow:0 2px 8px rgba(37,99,235,.2); }
        .btn-ghost {
            background:var(--surface2);color:var(--text2);border:1px solid var(--border);
            border-radius:14px;padding:14px;font-size:14px;font-weight:700;
            font-family:'Sora',sans-serif;transition:background .2s;cursor:pointer;
        }
        .btn-ghost:active { background:var(--border); }
        .btn-green {
            background:var(--green-bg);color:var(--green);
            border:1px solid var(--green-border);border-radius:14px;
            padding:13px;font-size:14px;font-weight:700;font-family:'Sora',sans-serif;
            display:flex;align-items:center;justify-content:center;gap:8px;
            transition:background .2s;cursor:pointer;
            width:100%;
        }

        /* ── Bottom nav ──────────────────────────────────────── */
        .bot-nav {
            background:rgba(255,255,255,0.94);
            border:1px solid var(--border);
            box-shadow:0 8px 40px rgba(15,23,42,.1);
            backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
            border-radius:32px;
        }
        .fab {
            background:linear-gradient(135deg,#2563eb,#1d4ed8);
            box-shadow:0 6px 24px rgba(37,99,235,.35);
            border-radius:22px;width:68px;height:68px;
            display:flex;align-items:center;justify-content:center;
            transition:transform .15s,box-shadow .15s;border:none;cursor:pointer;
        }
        .fab:active { transform:scale(0.91);box-shadow:0 3px 12px rgba(37,99,235,.25); }
        .fab2 {
            width:46px;height:46px;border-radius:14px;
            background:var(--surface2);border:1px solid var(--border);
            display:flex;align-items:center;justify-content:center;
            transition:background .2s,border-color .2s;cursor:pointer;
        }
        .fab2:active { background:var(--accent-bg);border-color:var(--accent-lt); }

        /* ── Processing overlay ──────────────────────────────── */
        .proc {
            position:fixed;inset:0;z-index:60;
            background:rgba(240,244,255,.92);backdrop-filter:blur(16px);
            display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
        }
        .spinner {
            width:44px;height:44px;border-radius:50%;
            border:3px solid var(--accent-lt);border-top-color:var(--accent);
            animation:spin .75s linear infinite;
        }

        /* ── Alert banner ────────────────────────────────────── */
        .alert-orange {
            background:#fff7ed;border:1px solid #fed7aa;border-radius:14px;
            padding:14px 16px;display:flex;align-items:center;gap:12;
            cursor:pointer;margin-bottom:14px;
        }

        /* ── Empty state ─────────────────────────────────────── */
        .empty-ico {
            width:64px;height:64px;border-radius:20px;
            background:var(--surface);border:1px solid var(--border);
            display:flex;align-items:center;justify-content:center;
            animation:float 3s ease-in-out infinite;
        }

        button { cursor:pointer;font-family:'Sora',sans-serif; }
    </style>
</head>
<body>
    <div id="root">
        <div class="splash">
            <div style="animation:fadeUp .6s ease both;display:flex;flex-direction:column;align-items:center;">
                <div style="width:88px;height:88px;margin-bottom:24px;animation:float 3s ease-in-out infinite;">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
                        <rect x="56" y="136" width="400" height="240" rx="28" fill="rgba(255,255,255,.1)" stroke="rgba(255,255,255,.25)" stroke-width="2"/>
                        <rect x="72" y="152" width="368" height="208" rx="20" fill="rgba(255,255,255,.15)"/>
                        <circle cx="160" cy="256" r="38" fill="rgba(255,255,255,.2)"/>
                        <rect x="220" y="230" width="160" height="16" rx="6" fill="rgba(255,255,255,.4)"/>
                        <rect x="220" y="262" width="110" height="12" rx="4" fill="rgba(255,255,255,.2)"/>
                        <rect x="72" y="152" width="368" height="14" fill="#f97316" opacity=".9">
                            <animate attributeName="y" values="152;344;152" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
                            <animate attributeName="opacity" values="0;.9;0" dur="2s" repeatCount="indefinite"/>
                        </rect>
                    </svg>
                </div>
                <div style="font-family:Sora,sans-serif;font-size:28px;font-weight:800;color:#fff;letter-spacing:-.5px;">SnapCard</div>
                <div style="font-family:Sora,sans-serif;font-size:11px;color:rgba(255,255,255,.4);margin-top:10px;letter-spacing:3px;text-transform:uppercase;">每一次相遇都值得期待</div>
            </div>
        </div>
    </div>

    <script>
        window.onerror = function(msg) {
            document.getElementById('root').innerHTML =
              '<div style="padding:24px;text-align:center;margin-top:60px;font-family:sans-serif;">' +
              '<p style="color:#dc2626;font-weight:700;">應用程式發生錯誤</p>' +
              '<p style="font-size:12px;color:#64748b;">'+msg+'</p>' +
              '<button onclick="localStorage.clear();location.reload()" style="padding:12px 24px;background:#2563eb;color:#fff;border:none;border-radius:10px;margin-top:16px;font-size:14px;cursor:pointer;">清除資料並重整</button></div>';
        };
    </script>

    <script type="text/babel">
        const { useState, useRef, useEffect, useMemo, Component } = React;

        const safeLS = {
            get: k => { try{return localStorage.getItem(k);}catch{return null;} },
            del: k => { try{localStorage.removeItem(k);}catch{} },
        };

        const db = {
            open: () => new Promise((res,rej) => {
                try {
                    const r = indexedDB.open('SnapCardDB',1);
                    r.onupgradeneeded = e => { const d=e.target.result; if(!d.objectStoreNames.contains('cards')) d.createObjectStore('cards',{keyPath:'id'}); };
                    r.onsuccess = e => res(e.target.result);
                    r.onerror   = e => rej(e.target.error);
                } catch(e) { rej(e); }
            }),
            all: async () => { const d=await db.open(); return new Promise((res,rej)=>{ const q=d.transaction(['cards'],'readonly').objectStore('cards').getAll(); q.onsuccess=()=>res(q.result); q.onerror=()=>rej(q.error); }); },
            put: async c  => { const d=await db.open(); return new Promise((res,rej)=>{ const q=d.transaction(['cards'],'readwrite').objectStore('cards').put(c); q.onsuccess=()=>res(q.result); q.onerror=()=>rej(q.error); }); },
            del: async id => { const d=await db.open(); return new Promise((res,rej)=>{ const q=d.transaction(['cards'],'readwrite').objectStore('cards').delete(id); q.onsuccess=()=>res(); q.onerror=()=>rej(q.error); }); },
        };

        class ErrorBoundary extends Component {
            constructor(p){super(p);this.state={err:false,msg:''};}
            static getDerivedStateFromError(e){return{err:true,msg:e.message};}
            render(){ if(this.state.err) return(
                <div style={{height:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24,fontFamily:'Sora,sans-serif'}}>
                    <p style={{color:'#dc2626',fontWeight:700}}>發生錯誤</p>
                    <p style={{fontSize:12,color:'#64748b'}}>{this.state.msg}</p>
                    <button onClick={()=>{localStorage.clear();location.reload()}} style={{marginTop:16,padding:'12px 24px',background:'#2563eb',color:'white',border:'none',borderRadius:10,fontSize:14,cursor:'pointer'}}>重置並重整</button>
                </div>);
                return this.props.children;
            }
        }

        /* Inline SVG icon map — zero DOM ops, instant render */
        const ICONS = {
          'settings':      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
          'search':        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
          'x':             <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
          'chevron-right': <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
          'credit-card':   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>,
          'trash-2':       <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>,
          'key':           <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>,
          'database':      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>,
          'upload':        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>,
          'download':      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="8 17 12 21 16 17"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.88 18.09A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.36"/></svg>,
          'pen-tool':      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>,
          'scan-line':     <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg>,
          'camera':        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>,
          'edit-2':        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>,
          'building-2':    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></svg>,
          'smartphone':    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>,
          'phone':         <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.18 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.6a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>,
          'printer':       <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>,
          'at-sign':       <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94"/></svg>,
          'map-pin':       <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>,
          'contact':       <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
          'image-plus':    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/><line x1="16" y1="5" x2="16" y2="11"/><line x1="13" y1="8" x2="19" y2="8"/></svg>,
        };
        const Icon = ({name, size=20, style={}}) => {
            const svg = ICONS[name];
            if(!svg) return null;
            return <span style={{display:'inline-flex',alignItems:'center',width:size,height:size,flexShrink:0,...style}}>
                {React.cloneElement(svg, {width:size, height:size})}
            </span>;
        };

        const compress = file => new Promise((res,rej)=>{
            if(!file) return rej();
            const u=URL.createObjectURL(file); const img=new Image(); img.src=u;
            img.onload=()=>{ URL.revokeObjectURL(u); const c=document.createElement('canvas'); const M=1200; let w=img.width,h=img.height; if(w>h){if(w>M){h*=M/w;w=M;}}else{if(h>M){w*=M/h;h=M;}} c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',.8)); };
            img.onerror=rej;
        });

        /* ── Category styles ─────────────────────────────────── */
        const CAT = {
            "工作-客戶": {bg:'#eff6ff',border:'#bfdbfe',text:'#1d4ed8',dot:'#2563eb'},
            "工作-廠商": {bg:'#faf5ff',border:'#e9d5ff',text:'#7c3aed',dot:'#8b5cf6'},
            "家人":      {bg:'#fff7ed',border:'#fed7aa',text:'#c2410c',dot:'#f97316'},
            "朋友":      {bg:'#f0fdf4',border:'#bbf7d0',text:'#15803d',dot:'#22c55e'},
        };
        const cs = c => CAT[c]||{bg:'#f8fafc',border:'#e2e8f0',text:'#64748b',dot:'#94a3b8'};

        /* ── Camera Scanner ──────────────────────────────────── */
        const Camera = ({onCapture, onCancel}) => {
            const vr = useRef(null);
            const [err, setErr] = useState(null);
            useEffect(()=>{
                let s=null;
                (async()=>{ try{ s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment",width:{ideal:1920},height:{ideal:1080}}}); if(vr.current){vr.current.srcObject=s;vr.current.play().catch(()=>{}); } }catch(e){setErr("相機錯誤："+e.message);} })();
                return ()=>s?.getTracks().forEach(t=>t.stop());
            },[]);
            const shoot=()=>{
                const v=vr.current; if(!v) return;
                const c=document.createElement("canvas");
                const vR=v.videoWidth/v.videoHeight, dR=v.clientWidth/v.clientHeight;
                let sW=v.videoWidth,sH=v.videoHeight,sx=0,sy=0;
                if(vR>dR){sW=v.videoHeight*dR;sx=(v.videoWidth-sW)/2;}else{sH=v.videoWidth/dR;sy=(v.videoHeight-sH)/2;}
                const fW=sW*.75,fH=fW/1.6,fX=sx+(sW-fW)/2,fY=sy+(sH-fH)/2;
                const M=1200;let dW=fW,dH=fH;if(dW>M||dH>M){const sc=Math.min(M/dW,M/dH);dW*=sc;dH*=sc;}
                c.width=dW;c.height=dH;c.getContext('2d').drawImage(v,fX,fY,fW,fH,0,0,dW,dH);
                onCapture(c.toDataURL("image/jpeg",.8));
            };
            return (
                <div style={{position:'fixed',inset:0,background:'#000',zIndex:50,display:'flex',flexDirection:'column'}}>
                    <div style={{flex:1,position:'relative',overflow:'hidden'}}>
                        <video ref={vr} playsInline muted autoPlay style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover',zIndex:10}}/>
                        {err && <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',color:'white',background:'rgba(0,0,0,.85)',zIndex:20,fontSize:14,padding:20,textAlign:'center'}}>{err}</div>}
                        <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',zIndex:20,pointerEvents:'none'}}>
                            <div style={{width:'75%',aspectRatio:'1.6/1',position:'relative'}}>
                                {[['top','left'],['top','right'],['bottom','left'],['bottom','right']].map(([v,h])=>(
                                    <div key={v+h} style={{position:'absolute',[v]:-2,[h]:-2,width:22,height:22,borderTop:v==='top'?'2.5px solid #3b82f6':'none',borderBottom:v==='bottom'?'2.5px solid #3b82f6':'none',borderLeft:h==='left'?'2.5px solid #3b82f6':'none',borderRight:h==='right'?'2.5px solid #3b82f6':'none'}}/>
                                ))}
                                <div style={{position:'absolute',inset:0,boxShadow:'0 0 0 9999px rgba(0,0,0,.55)',overflow:'hidden',borderRadius:4}}>
                                    <div className="scan-line"/>
                                </div>
                            </div>
                        </div>
                        <div style={{position:'absolute',bottom:148,width:'100%',textAlign:'center',zIndex:20}}>
                            <span style={{padding:'7px 18px',background:'rgba(0,0,0,.55)',color:'rgba(255,255,255,.85)',fontSize:12,borderRadius:20,backdropFilter:'blur(8px)'}}>請將名片置入框內</span>
                        </div>
                    </div>
                    <div style={{background:'rgba(0,0,0,.88)',height:130,display:'flex',alignItems:'center',justifyContent:'center',gap:52,backdropFilter:'blur(16px)'}}>
                        <button onClick={onCancel} style={{color:'rgba(255,255,255,.65)',background:'none',border:'none',fontSize:15,fontWeight:600,fontFamily:'Sora,sans-serif',padding:'12px 20px'}}>取消</button>
                        <button onClick={shoot} style={{width:66,height:66,borderRadius:'50%',background:'white',border:'4px solid rgba(255,255,255,.25)',boxShadow:'0 0 0 2px rgba(59,130,246,.6),0 8px 28px rgba(0,0,0,.5)'}}/>
                        <div style={{width:60}}/>
                    </div>
                </div>
            );
        };

        /* ── App ─────────────────────────────────────────────── */
        function App() {
            const [splash,  setSplash]  = useState(true);
            const [view,    setView]    = useState("home");
            const [cards,   setCards]   = useState([]);
            const [capImg,  setCapImg]  = useState(null);
            const [backImg, setBackImg] = useState(null);
            const [avi,     setAvi]     = useState(null);
            const [addImg,  setAddImg]  = useState(null);
            const [proc,    setProc]    = useState(false);
            const [res,     setRes]     = useState({});
            const [cid,     setCid]     = useState(null);
            const [fcat,    setFcat]    = useState("全部");
            const [q,       setQ]       = useState("");
            const [apiKey,  setApiKey]  = useState("");
            const [model,   setModel]   = useState("");
            const [models,  setModels]  = useState([]);
            const [testSt,  setTestSt]  = useState("idle");
            const [testMsg, setTestMsg] = useState("");
            const [status,  setStatus]  = useState("");
            const [error,   setError]   = useState(null);

            const rnd = useMemo(()=>`f_${Math.random().toString(36).slice(2)}`,[]);

            useEffect(()=>{ safeLS.del("snapcard_api_key"); setTimeout(()=>setSplash(false),2200); },[]);
            useEffect(()=>{ db.all().then(d=>setCards(sort(d))).catch(()=>{}); },[]);

            const sort = arr => [...arr].sort((a,b)=>{
                const ca=(a.company||"").toLowerCase(),cb=(b.company||"").toLowerCase();
                if(ca<cb)return -1;if(ca>cb)return 1;
                const na=(a.name||"").toLowerCase(),nb=(b.name||"").toLowerCase();
                if(na<nb)return -1;if(na>nb)return 1;
                return b.id-a.id;
            });

            const imgUp = async (e,fn) => { if(e.target.files[0]){ try{fn(await compress(e.target.files[0]));}catch{alert("圖片處理失敗");} } };
            const clean = k => k.trim().replace(/[\r\n\s]/g,'');
            const startScan   = () => { if(!apiKey){setView("settings");return;} setView("scan"); };
            const startManual = () => { setRes({category:"工作-客戶"});setCapImg(null);setBackImg(null);setAvi(null);setAddImg(null);setCid(null);setView("result"); };
            const clearKey    = () => { setApiKey("");setTestSt("idle");setTestMsg("");setModels([]);setModel(""); };

            const retry = async (url,opts) => {
                const D=[1000,2000];
                for(let i=0;i<=D.length;i++){
                    try{ const r=await fetch(url,opts); if(r.status===429)return r; if(!r.ok&&r.status>=500&&i<D.length){await new Promise(re=>setTimeout(re,D[i]));continue;} return r; }
                    catch(e){ if(i===D.length)throw e; await new Promise(re=>setTimeout(re,D[i])); }
                }
            };
            const getModels = async k => {
                const r=await retry(`https://generativelanguage.googleapis.com/v1beta/models?key=${k}`,{method:'GET'});
                if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(`[${r.status}] ${e.error?.message||r.statusText}`);}
                const d=await r.json();
                const u=d.models.filter(m=>m.supportedGenerationMethods?.includes("generateContent")&&m.name.includes("gemini")&&!m.name.includes("1.5")).map(m=>m.name.replace("models/",""));
                if(!u.length)throw new Error("此 Key 無法存取 Gemini 2.0/3.0 模型");
                return u;
            };
            const testKey = async () => {
                if(!apiKey)return setTestMsg("請輸入 Key");
                setTestSt("testing");setTestMsg("查詢授權模型中…");
                try{ const u=await getModels(clean(apiKey));setModels(u);const b=u.find(m=>m.includes("gemini-3.0"))||u.find(m=>m.includes("gemini-2.0"))||u[0];setModel(b);setTestSt("success");setTestMsg(`驗證成功！偵測到：${b}`); }
                catch(e){ setTestSt("error");setTestMsg(`失敗：${e.message}`); }
            };

            const analyze = async b64 => {
                setProc(true);setError(null);
                if(!apiKey){setError("請先設定 API Key");setView("settings");setProc(false);return;}
                const k=clean(apiKey); let mods=models;
                try{
                    if(!mods.length){ setStatus("確認授權模型…");mods=await getModels(k);setModels(mods);const b=mods.find(m=>m.includes("gemini-3.0"))||mods.find(m=>m.includes("gemini-2.0"))||mods[0];setModel(b); }
                    const target=model||mods.find(m=>m.includes("gemini-3.0"))||mods.find(m=>m.includes("gemini-2.0"))||mods[0];
                    let toTry=[]; if(target&&mods.includes(target))toTry.push(target);
                    [...mods].sort((a,b)=>(b.includes("3.0")?3:b.includes("2.0")?2:0)-(a.includes("3.0")?3:a.includes("2.0")?2:0)).forEach(m=>{if(!toTry.includes(m))toTry.push(m);});
                    const prompt=`分析名片回傳JSON:{"name":"","jobTitle":"","company":"","mobile":"","tel":"","fax":"","email":"","address":"","category":"工作-客戶","note":""}。規則:1.分mobile/tel/fax 2.company合併中英 3.category[工作-客戶,工作-廠商,家人,朋友]。無Markdown。`;
                    const imgPart={inlineData:{mimeType:"image/jpeg",data:b64.split(',')[1]}};
                    let lastErr="",ok=null;
                    for(const m of toTry){
                        setStatus("AI 辨識中…");
                        try{
                            const r=await retry(`https://generativelanguage.googleapis.com/v1beta/models/${m}:generateContent?key=${k}`,{method:"POST",headers:{"Content-Type":"application/json"},referrerPolicy:"no-referrer",body:JSON.stringify({contents:[{parts:[{text:prompt},imgPart]}]})});
                            if(!r.ok){const e=await r.json().catch(()=>({}));const msg=e.error?.message||r.statusText;if(r.status===400&&(msg.includes("API key")||msg.includes("INVALID_ARGUMENT")))throw new Error("API Key 無效");lastErr=`[${r.status}] ${msg}`;continue;}
                            const j=await r.json();let t=j.candidates?.[0]?.content?.parts?.[0]?.text;if(!t){lastErr="模型回傳空白";continue;}
                            t=t.replace(/```json|```/g,'').trim();const s=t.indexOf('{'),e=t.lastIndexOf('}');ok=JSON.parse(t.substring(s,e+1));break;
                        }catch(e){if(e.message.includes("API Key"))throw e;lastErr=e.message;}
                    }
                    if(!ok)throw new Error(`連線失敗 (${lastErr})`);
                    setRes(ok||{category:"工作-客戶"});setBackImg(null);setAddImg(null);setAvi(null);setCid(null);setView("result");
                }catch(e){setError(`辨識失敗：${e.message}`);setView("home");}
                finally{setProc(false);}
            };

            const saveCard = async () => {
                const d={id:cid||Date.now(),...res,image:capImg,backImage:backImg,avatar:avi,additionalImage:addImg,category:res.category||"工作-客戶"};
                await db.put(d);setCards(sort(await db.all()));setView("home");
            };
            const delCard = async (id,e)=>{ e.stopPropagation();if(confirm("確定刪除這張名片？")){await db.del(id);setCards(p=>p.filter(c=>c.id!==id));} };

            const exportVcf=()=>{ const c=res;let v="BEGIN:VCARD\nVERSION:3.0\n";let dn=(c.company?`${c.company} `:"")+(c.name||"未命名");v+=`FN:${dn}\nN:${dn};;;;\n`;if(c.company)v+=`ORG:${c.company};\n`;if(c.jobTitle)v+=`TITLE:${c.jobTitle}\n`;if(c.mobile)v+=`TEL;type=CELL:${c.mobile}\n`;if(c.tel)v+=`TEL;type=WORK:${c.tel}\n`;if(c.fax)v+=`TEL;type=FAX:${c.fax}\n`;if(c.email)v+=`EMAIL;type=INTERNET;type=WORK:${c.email}\n`;if(c.address)v+=`ADR;type=WORK:;;${c.address};;;;\n`;const ns=[c.category&&`分類: ${c.category}`,c.note].filter(Boolean);if(ns.length)v+=`NOTE:${ns.join(' | ')}\n`;v+="END:VCARD\n";const a=document.createElement('a');a.download=`${dn}.vcf`;a.href=URL.createObjectURL(new Blob([v],{type:'text/vcard'}));document.body.appendChild(a);a.click();document.body.removeChild(a); };
            const exportJSON=()=>{ const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(cards,null,2)],{type:"application/json"}));a.download="snapcard_backup.json";a.click(); };
            const importJSON=e=>{ const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=async ev=>{try{const d=JSON.parse(ev.target.result);for(const c of d)await db.put(c);setCards(sort(await db.all()));alert("匯入成功");}catch{alert("格式錯誤");}};r.readAsText(f);e.target.value=''; };

            const baseMods=["gemini-3.0-flash","gemini-3.0-pro","gemini-2.0-flash","gemini-2.0-flash-exp"];
            const allMods=[...new Set([...baseMods,...models])].filter(m=>!m.includes("1.5"));
            const filtered=cards.filter(c=>(fcat==="全部"||c.category===fcat)&&(!q||(c.name?.includes(q)||c.company?.includes(q)||c.email?.includes(q))));

            /* ── Splash ─────────────────────────────────────── */
            if(splash) return (
                <div className="splash">
                    <div style={{animation:'fadeUp .6s ease both',display:'flex',flexDirection:'column',alignItems:'center'}}>
                        <div style={{width:88,height:88,marginBottom:24,animation:'float 3s ease-in-out infinite'}}>
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
                                <rect x="56" y="136" width="400" height="240" rx="28" fill="rgba(255,255,255,.1)" stroke="rgba(255,255,255,.25)" strokeWidth="2"/>
                                <rect x="72" y="152" width="368" height="208" rx="20" fill="rgba(255,255,255,.15)"/>
                                <circle cx="160" cy="256" r="38" fill="rgba(255,255,255,.2)"/>
                                <rect x="220" y="230" width="160" height="16" rx="6" fill="rgba(255,255,255,.4)"/>
                                <rect x="220" y="262" width="110" height="12" rx="4" fill="rgba(255,255,255,.2)"/>
                                <rect x="72" y="152" width="368" height="14" fill="#f97316" opacity=".9">
                                    <animate attributeName="y" values="152;344;152" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
                                    <animate attributeName="opacity" values="0;.9;0" dur="2s" repeatCount="indefinite"/>
                                </rect>
                            </svg>
                        </div>
                        <div style={{fontFamily:'Sora,sans-serif',fontSize:28,fontWeight:800,color:'#fff',letterSpacing:'-.5px'}}>SnapCard</div>
                        <div style={{fontFamily:'Sora,sans-serif',fontSize:11,color:'rgba(255,255,255,.4)',marginTop:10,letterSpacing:'3px',textTransform:'uppercase'}}>每一次相遇都值得期待</div>
                    </div>
                </div>
            );

            return (
                <div style={{maxWidth:428,margin:'0 auto',height:'100svh',background:'var(--bg)',display:'flex',flexDirection:'column',position:'relative',overflow:'hidden'}}>

                    {/* Header */}
                    <header className="hdr">
                        <div>
                            <div className="hdr-title">SNAPCARD</div>
                            <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{cards.length>0?`共 ${cards.length} 張名片`:'專業人脈管家'}</div>
                        </div>
                        <button className="hdr-btn" onClick={()=>setView("settings")}><Icon name="settings" size={17}/></button>
                    </header>

                    {/* Main */}
                    <main style={{flex:1,overflowY:'auto',padding:'0 0 110px'}} className="no-scroll">

                        {error && <div style={{margin:'12px 16px 0',padding:'12px 16px',background:'var(--red-bg)',border:'1px solid var(--red-border)',borderRadius:12,color:'var(--red)',fontSize:12,fontWeight:600,lineHeight:1.5}}>{error}</div>}

                        {/* ══ HOME ══ */}
                        {view==="home" && (
                            <div style={{padding:'16px 16px 0'}}>
                                {!apiKey && (
                                    <div className="alert-orange" onClick={()=>setView("settings")}>
                                        <span style={{fontSize:18}}>⚡</span>
                                        <div style={{flex:1}}>
                                            <div style={{fontSize:13,fontWeight:700,color:'#c2410c'}}>需要設定 API Key</div>
                                            <div style={{fontSize:11,color:'#f97316',marginTop:1}}>點此前往設定</div>
                                        </div>
                                        <Icon name="chevron-right" size={16} style={{color:'#f97316',opacity:.6}}/>
                                    </div>
                                )}

                                {/* Search */}
                                <div className="search-box" style={{marginBottom:12}}>
                                    <Icon name="search" size={15} style={{color:'var(--text3)',marginRight:10,flexShrink:0}}/>
                                    <input type="text" placeholder="搜尋姓名、公司、Email…" value={q} onChange={e=>setQ(e.target.value)}/>
                                    {q && <button onClick={()=>setQ("")} style={{background:'none',border:'none',color:'var(--text3)',display:'flex',padding:4}}><Icon name="x" size={14}/></button>}
                                </div>

                                {/* Filter */}
                                <div style={{display:'flex',gap:8,overflowX:'auto',paddingBottom:12}} className="no-scroll">
                                    {["全部","工作-客戶","工作-廠商","家人","朋友"].map(cat=>{
                                        const s=cs(cat); const on=fcat===cat;
                                        return (
                                            <button key={cat} onClick={()=>setFcat(cat)} style={{padding:'6px 14px',borderRadius:20,fontSize:12,fontWeight:600,whiteSpace:'nowrap',flexShrink:0,background:on?s.bg:'var(--surface)',border:on?`1px solid ${s.border}`:'1px solid var(--border)',color:on?s.text:'var(--text3)',transition:'all .2s',cursor:'pointer'}}>
                                                {cat==="全部"?`全部 (${cards.length})`:cat}
                                            </button>
                                        );
                                    })}
                                </div>

                                {/* List */}
                                {filtered.length===0 ? (
                                    <div style={{textAlign:'center',padding:'60px 20px',display:'flex',flexDirection:'column',alignItems:'center',gap:14}}>
                                        <div className="empty-ico"><Icon name="credit-card" size={26} style={{color:'var(--text3)'}}/></div>
                                        <div>
                                            <div style={{fontSize:15,fontWeight:700,color:'var(--text2)'}}>{q?'找不到符合的名片':'還沒有名片'}</div>
                                            <div style={{fontSize:12,color:'var(--text3)',marginTop:4}}>{q?'試試其他關鍵字':'點下方按鈕掃描或手動新增'}</div>
                                        </div>
                                    </div>
                                ) : (
                                    <div style={{display:'flex',flexDirection:'column',gap:10}}>
                                        {filtered.map((c,i)=>{
                                            const s=cs(c.category);
                                            return (
                                                <div key={c.id} className="card" style={{animationDelay:`${i*.04}s`}}
                                                    onClick={()=>{setRes(c);setCapImg(c.image);setBackImg(c.backImage);setAvi(c.avatar);setAddImg(c.additionalImage);setCid(c.id);setView("result");}}>

                                                    {/* Avatar — white bg, blue initial */}
                                                    {c.avatar
                                                        ? <img src={c.avatar} style={{width:48,height:48,borderRadius:14,objectFit:'cover',flexShrink:0,border:'1px solid var(--border)'}}/>
                                                        : <div className="avi">{(c.name||"?")[0]}</div>
                                                    }

                                                    {/* Info */}
                                                    <div style={{flex:1,minWidth:0}}>
                                                        <div style={{fontWeight:700,fontSize:15,color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.name||'未命名'}</div>
                                                        <div style={{fontSize:12,color:'var(--text2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginTop:2}}>{[c.jobTitle,c.company].filter(Boolean).join(' · ')}</div>
                                                        {c.category && (
                                                            <span className="chip" style={{marginTop:6,background:s.bg,border:`1px solid ${s.border}`,color:s.text}}>
                                                                <span style={{width:5,height:5,borderRadius:'50%',background:s.dot,display:'inline-block',flexShrink:0}}/>
                                                                {c.category}
                                                            </span>
                                                        )}
                                                    </div>

                                                    {/* Delete */}
                                                    <button onClick={(e)=>delCard(c.id,e)}
                                                        style={{width:32,height:32,borderRadius:10,background:'var(--surface2)',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text3)',transition:'all .2s',flexShrink:0}}
                                                        onMouseEnter={e=>{e.currentTarget.style.background='var(--red-bg)';e.currentTarget.style.color='var(--red)';e.currentTarget.style.borderColor='var(--red-border)';}}
                                                        onMouseLeave={e=>{e.currentTarget.style.background='var(--surface2)';e.currentTarget.style.color='var(--text3)';e.currentTarget.style.borderColor='var(--border)';}}>
                                                        <Icon name="trash-2" size={14}/>
                                                    </button>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ══ SETTINGS ══ */}
                        {view==="settings" && (
                            <div style={{padding:'16px 16px 0',display:'flex',flexDirection:'column',gap:16}}>
                                <div className="sec">
                                    <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:20}}>
                                        <div style={{width:36,height:36,borderRadius:10,background:'var(--accent-bg)',border:'1px solid var(--accent-lt)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                                            <Icon name="key" size={16} style={{color:'var(--accent)'}}/>
                                        </div>
                                        <div>
                                            <div style={{fontSize:15,fontWeight:700}}>API 設定</div>
                                            <div style={{fontSize:11,color:'var(--text3)'}}>Google Gemini API</div>
                                        </div>
                                    </div>

                                    {/* Honeypot */}
                                    <div style={{height:0,overflow:'hidden'}}><input type="text"/><input type="password"/></div>

                                    <div style={{marginBottom:12}}>
                                        <label style={{fontSize:11,color:'var(--text3)',display:'block',marginBottom:7,fontWeight:600,letterSpacing:'.3px'}}>GOOGLE API KEY</label>
                                        <div style={{position:'relative'}}>
                                            <input type="password" autoComplete="new-password" readOnly onFocus={e=>e.target.removeAttribute('readonly')} name={rnd} value={apiKey} onChange={e=>setApiKey(e.target.value)} className="inp" style={{width:'100%',padding:'12px 40px 12px 14px',fontSize:13,fontFamily:'DM Mono,monospace',letterSpacing:'.5px',display:'block'}} placeholder="AIzaSy…"/>
                                            {apiKey && <button onClick={clearKey} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'var(--text3)',display:'flex',padding:4}}><Icon name="x" size={15}/></button>}
                                        </div>
                                        <div style={{fontSize:10,color:'var(--text3)',marginTop:7}}>✦ 貼上 Key 即可直接返回首頁掃描</div>
                                    </div>

                                    {models.length>0 && (
                                        <div style={{marginBottom:14}}>
                                            <label style={{fontSize:11,color:'var(--text3)',display:'block',marginBottom:7,fontWeight:600,letterSpacing:'.3px'}}>AI 模型</label>
                                            <select value={model} onChange={e=>setModel(e.target.value)} className="inp" style={{width:'100%',padding:'12px 14px',fontSize:13,cursor:'pointer'}}>
                                                {allMods.map(m=><option key={m} value={m}>{m}</option>)}
                                            </select>
                                        </div>
                                    )}

                                    <div style={{display:'flex',gap:10}}>
                                        <button onClick={testKey} disabled={testSt==="testing"} style={{flex:1,padding:11,borderRadius:12,fontSize:13,fontWeight:700,fontFamily:'Sora,sans-serif',cursor:'pointer',background:testSt==="success"?'var(--green-bg)':testSt==="error"?'var(--red-bg)':'var(--accent-bg)',border:`1px solid ${testSt==="success"?'var(--green-border)':testSt==="error"?'var(--red-border)':'var(--accent-lt)'}`,color:testSt==="success"?'var(--green)':testSt==="error"?'var(--red)':'var(--accent)'}}>
                                            {testSt==="testing"?"偵測中…":testSt==="success"?"✓ 偵測成功":"偵測可用模型"}
                                        </button>
                                        <button onClick={()=>window.open("https://aistudio.google.com/app/apikey")} style={{flex:1,padding:11,borderRadius:12,fontSize:13,fontWeight:700,fontFamily:'Sora,sans-serif',cursor:'pointer',background:'var(--surface2)',border:'1px solid var(--border)',color:'var(--text2)'}}>取得 Key ↗</button>
                                    </div>

                                    {testMsg && (
                                        <div style={{marginTop:10,padding:'10px 12px',borderRadius:10,fontSize:12,...(testSt==="error"?{color:'var(--red)',background:'var(--red-bg)',border:'1px solid var(--red-border)'}:{color:'var(--green)',background:'var(--green-bg)',border:'1px solid var(--green-border)'})}}>
                                            {testMsg}
                                        </div>
                                    )}
                                </div>

                                <div className="sec">
                                    <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
                                        <div style={{width:36,height:36,borderRadius:10,background:'#faf5ff',border:'1px solid #e9d5ff',display:'flex',alignItems:'center',justifyContent:'center'}}>
                                            <Icon name="database" size={16} style={{color:'#7c3aed'}}/>
                                        </div>
                                        <div>
                                            <div style={{fontSize:15,fontWeight:700}}>資料管理</div>
                                            <div style={{fontSize:11,color:'var(--text3)'}}>{cards.length} 張名片</div>
                                        </div>
                                    </div>
                                    <div style={{display:'flex',flexDirection:'column',gap:8}}>
                                        <button onClick={exportJSON} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'13px 14px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:12,color:'var(--text2)',fontSize:13,fontWeight:600,cursor:'pointer'}}>
                                            <span>匯出備份 (JSON)</span><Icon name="upload" size={16}/>
                                        </button>
                                        <label style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'13px 14px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:12,color:'var(--text2)',fontSize:13,fontWeight:600,cursor:'pointer'}}>
                                            <span>匯入資料</span><Icon name="download" size={16}/>
                                            <input type="file" accept=".json" onChange={importJSON} style={{display:'none'}}/>
                                        </label>
                                    </div>
                                </div>

                                <div style={{textAlign:'center',fontSize:10,color:'var(--text3)',letterSpacing:'1px'}}>SnapCard · Version 38.3</div>
                                <button className="btn-ghost" onClick={()=>setView("home")} style={{marginBottom:16}}>← 返回</button>
                            </div>
                        )}

                        {/* ══ SCAN ══ */}
                        {view==="scan" && <Camera onCapture={b=>{setCapImg(b);setView("home");analyze(b);}} onCancel={()=>setView("home")}/>}

                        {/* ══ RESULT ══ */}
                        {view==="result" && (
                            <div style={{display:'flex',flexDirection:'column'}}>
                                {/* Card image preview */}
                                <div style={{background:'#f1f5f9',position:'relative',borderBottom:'1px solid var(--border)'}}>
                                    {capImg
                                        ? <img src={capImg} style={{width:'100%',maxHeight:220,objectFit:'contain',display:'block'}}/>
                                        : <div style={{height:100,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text3)',fontSize:13}}>無名片影像</div>
                                    }
                                    <label style={{position:'absolute',bottom:10,right:10,width:34,height:34,borderRadius:10,background:'rgba(255,255,255,.9)',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',boxShadow:'0 2px 8px rgba(0,0,0,.08)'}}>
                                        <Icon name="camera" size={15} style={{color:'var(--text2)'}}/>
                                        <input type="file" accept="image/*" style={{display:'none'}} onChange={e=>imgUp(e,setCapImg)}/>
                                    </label>
                                </div>

                                <div style={{padding:'20px 16px',display:'flex',flexDirection:'column',gap:14}}>
                                    {/* Profile header */}
                                    <div style={{display:'flex',gap:14,alignItems:'flex-start'}}>
                                        <div style={{position:'relative',flexShrink:0}}>
                                            {avi
                                                ? <img src={avi} style={{width:64,height:64,borderRadius:16,objectFit:'cover',border:'1.5px solid var(--border)'}}/>
                                                : <div style={{width:64,height:64,borderRadius:16,background:'var(--accent-bg)',border:'1.5px solid var(--accent-lt)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:26,fontWeight:800,color:'var(--accent)',fontFamily:'Sora,sans-serif'}}>{(res.name||"?")[0]}</div>
                                            }
                                            <label style={{position:'absolute',bottom:-6,right:-6,width:24,height:24,borderRadius:7,background:'white',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',boxShadow:'0 1px 4px rgba(0,0,0,.08)'}}>
                                                <Icon name="edit-2" size={11} style={{color:'var(--text2)'}}/>
                                                <input type="file" accept="image/*" style={{display:'none'}} onChange={e=>imgUp(e,setAvi)}/>
                                            </label>
                                        </div>
                                        <div style={{flex:1,display:'flex',flexDirection:'column',gap:8}}>
                                            <input type="text" value={res.name||""} onChange={e=>setRes({...res,name:e.target.value})} placeholder="姓名" style={{background:'transparent',border:'none',borderBottom:'2px solid var(--border)',color:'var(--text)',fontSize:20,fontWeight:800,padding:'4px 0',outline:'none',fontFamily:'Sora,sans-serif',width:'100%'}}/>
                                            <input type="text" value={res.jobTitle||""} onChange={e=>setRes({...res,jobTitle:e.target.value})} placeholder="職稱" style={{background:'transparent',border:'none',borderBottom:'1px solid var(--border)',color:'var(--text2)',fontSize:13,padding:'4px 0',outline:'none',fontFamily:'Sora,sans-serif',width:'100%'}}/>
                                        </div>
                                    </div>

                                    {/* Fields */}
                                    <div style={{display:'flex',flexDirection:'column',gap:8}}>
                                        {[
                                            {k:"company",i:"building-2",p:"公司名稱"},
                                            {k:"mobile", i:"smartphone", p:"手機"},
                                            {k:"tel",    i:"phone",     p:"電話"},
                                            {k:"fax",    i:"printer",   p:"傳真"},
                                            {k:"email",  i:"at-sign",   p:"Email"},
                                            {k:"address",i:"map-pin",   p:"地址"},
                                        ].map(f=>{
                                            const val=res[f.k]; let href=null,tgt="";
                                            if(val){
                                                if(['mobile','tel','fax'].includes(f.k)) href=`tel:${val.replace(/[^0-9+]/g,'')}`;
                                                else if(f.k==='email') href=`mailto:${val}`;
                                                else if(f.k==='address'){href=`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(val)}`;tgt="_blank";}
                                            }
                                            return (
                                                <div key={f.k} className="field-row">
                                                    {href
                                                        ? <a href={href} target={tgt} style={{display:'flex',alignItems:'center',color:'var(--accent)',flexShrink:0,padding:2}}><Icon name={f.i} size={16}/></a>
                                                        : <span style={{display:'inline-flex',alignItems:'center',color:'var(--text3)',flexShrink:0}}><Icon name={f.i} size={16}/></span>
                                                    }
                                                    <input type="text" value={res[f.k]||""} onChange={e=>setRes({...res,[f.k]:e.target.value})} placeholder={f.p}/>
                                                </div>
                                            );
                                        })}
                                    </div>

                                    {/* Category */}
                                    <div>
                                        <div style={{fontSize:11,color:'var(--text3)',marginBottom:8,fontWeight:600,letterSpacing:'.3px'}}>聯絡人分類</div>
                                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                                            {["工作-客戶","工作-廠商","家人","朋友"].map(cat=>{
                                                const s=cs(cat); const on=res.category===cat;
                                                return (
                                                    <button key={cat} onClick={()=>setRes({...res,category:cat})} style={{padding:'10px',borderRadius:10,fontSize:12,fontWeight:700,fontFamily:'Sora,sans-serif',border:on?`1px solid ${s.border}`:'1px solid var(--border)',background:on?s.bg:'var(--surface2)',color:on?s.text:'var(--text3)',display:'flex',alignItems:'center',justifyContent:'center',gap:6,transition:'all .2s',cursor:'pointer'}}>
                                                        {on && <span style={{width:6,height:6,borderRadius:'50%',background:s.dot,display:'inline-block'}}/>}
                                                        {cat}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    {/* Note */}
                                    <textarea value={res.note||""} onChange={e=>setRes({...res,note:e.target.value})} placeholder="備註…" rows={3} className="inp" style={{padding:'12px 14px',fontSize:13,lineHeight:1.6,resize:'none',width:'100%'}}/>

                                    {/* Additional photo */}
                                    <div onClick={()=>document.getElementById('addphoto').click()} style={{borderRadius:14,border:'1.5px dashed var(--border)',background:'var(--surface2)',aspectRatio:'21/9',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',overflow:'hidden'}}>
                                        {addImg
                                            ? <img src={addImg} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                                            : <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:7,color:'var(--text3)'}}><Icon name="image-plus" size={20}/><span style={{fontSize:11}}>附件照片（名片背面等）</span></div>
                                        }
                                        <input id="addphoto" type="file" style={{display:'none'}} onChange={e=>imgUp(e,setAddImg)}/>
                                    </div>

                                    {/* Action buttons */}
                                    <div style={{display:'flex',flexDirection:'column',gap:10,paddingBottom:24}}>
                                        <button className="btn-green" onClick={exportVcf}><Icon name="contact" size={17}/>加入通訊錄 (.vcf)</button>
                                        <div style={{display:'flex',gap:10}}>
                                            <button className="btn-ghost" onClick={()=>setView("home")} style={{flex:1}}>取消</button>
                                            <button className="btn-primary" onClick={saveCard} style={{flex:2,width:'100%'}}>儲存名片</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Processing overlay */}
                        {proc && (
                            <div className="proc">
                                <div style={{width:68,height:68,borderRadius:20,background:'var(--accent-bg)',border:'1px solid var(--accent-lt)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                                    <div className="spinner"/>
                                </div>
                                <div style={{textAlign:'center'}}>
                                    <div style={{fontSize:15,fontWeight:700,color:'var(--text)'}}>{status||"AI 辨識中…"}</div>
                                    <div style={{fontSize:11,color:'var(--text3)',marginTop:5}}>請稍候</div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Bottom FAB — scan + manual only, no placeholder */}
                    {view==="home" && (
                        <div style={{position:'absolute',bottom:0,left:0,width:'100%',display:'flex',justifyContent:'center',padding:'0 0 28px',zIndex:20,pointerEvents:'none'}}>
                            <div className="bot-nav" style={{display:'flex',alignItems:'center',gap:24,padding:'12px 28px',pointerEvents:'auto'}}>

                                {/* Manual input */}
                                <button onClick={startManual} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:5,background:'none',border:'none',padding:'4px 8px'}}>
                                    <div className="fab2"><Icon name="pen-tool" size={19} style={{color:'var(--text2)'}}/></div>
                                    <span style={{fontSize:10,fontWeight:600,color:'var(--text3)',fontFamily:'Sora,sans-serif'}}>手動輸入</span>
                                </button>

                                {/* Scan (primary) */}
                                <button onClick={startScan} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6,background:'none',border:'none',padding:'4px 8px',marginTop:-20}}>
                                    <div className="fab"><Icon name="scan-line" size={30} style={{color:'white'}}/></div>
                                    <span style={{fontSize:10,fontWeight:700,color:'var(--accent)',fontFamily:'Sora,sans-serif'}}>掃描名片</span>
                                </button>

                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App/></ErrorBoundary>);
    </script>
</body>
</html>
