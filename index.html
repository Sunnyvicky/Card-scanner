<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SnapCard AI - 專業人脈管家</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SnapCard">
    <meta name="theme-color" content="#ffffff">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon-precomposed" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%23ffffff'/%3E%3Crect x='30' y='45' width='120' height='90' rx='12' fill='%231e3a8a'/%3E%3Ccircle cx='90' cy='90' r='20' fill='%23f59e0b'/%3E%3Crect x='45' y='127' width='90' height='6' rx='3' fill='%23a0aec0'/%3E%3C/svg%3E">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #f8fafc; color: #1e293b; margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 10; transform: scaleX(1); }
        @keyframes scan { 0% { top: 0%; opacity: 0; } 50% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
        .scan-line { position: absolute; left: 0; width: 100%; height: 2px; background: #f97316; box-shadow: 0 0 10px #f97316; animation: scan 2s linear infinite; }
        .splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 99999; transition: opacity 0.5s ease-out; }
    </style>
</head>
<body>
    <div id="root">
        <div class="splash-screen">
            <div style="width: 120px; height: 120px; margin-bottom: 24px;">
               <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
                    <rect x="86" y="156" width="340" height="200" rx="20" fill="white"/>
                    <circle cx="160" cy="256" r="35" fill="#e2e8f0"/>
                    <rect x="230" y="240" width="140" height="16" rx="4" fill="#94a3b8"/>
                    <rect x="230" y="270" width="100" height="12" rx="3" fill="#cbd5e1"/>
                    <rect x="86" y="156" width="340" height="16" fill="#f97316" opacity="0.8">
                        <animate attributeName="y" values="156;340;156" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1; 0.45 0 0.55 1") />
                    </rect>
                </svg>
            </div>
            <h1 style="font-size: 32px; font-weight: 900; color: white; font-family: sans-serif; letter-spacing: 1px;">SnapCard</h1>
            <p style="font-size: 14px; color: #cbd5e1; font-family: sans-serif; margin-top: 12px; letter-spacing: 2px; font-weight: 300;">每一次相遇都值得期待</p>
        </div>
    </div>
    <script>
        window.onerror = function(message) {
            const root = document.getElementById('root');
            if (root) {
                root.innerHTML = '<div style="padding:20px; text-align:center; color:red; margin-top:50px;"><h3>應用程式發生錯誤</h3><p>' + message + '</p><button onclick="localStorage.clear();location.reload()" style="padding:10px; background:#eee; border:1px solid #ccc; border-radius:5px; margin-top:10px;">清除資料並重整</button></div>';
            }
        };
    </script>
    <script>
        const { useState, useRef, useEffect, useMemo, Component } = React;
        const e = React.createElement;

        const safeLocalStorage = {
            getItem: (key) => { try { return localStorage.getItem(key); } catch(err) { return null; } },
            setItem: (key, value) => { try { localStorage.setItem(key, value); } catch(err) {} },
            removeItem: (key) => { try { localStorage.removeItem(key); } catch(err) {} }
        };

        const dbUtils = {
            open: () => new Promise((res, rej) => { try { const r=indexedDB.open('SnapCardDB',1); r.onupgradeneeded=(ev)=>{const d=ev.target.result;if(!d.objectStoreNames.contains('cards'))d.createObjectStore('cards',{keyPath:'id'});}; r.onsuccess=(ev)=>res(ev.target.result); r.onerror=(ev)=>rej(ev.target.error); } catch(err){rej(err);} }),
            getAll: async () => { const db=await dbUtils.open(); return new Promise((res, rej)=>{ const tx=db.transaction(['cards'],'readonly'); const req=tx.objectStore('cards').getAll(); req.onsuccess=()=>res(req.result); req.onerror=()=>rej(req.error); }); },
            put: async (card) => { const db=await dbUtils.open(); return new Promise((res, rej)=>{ const tx=db.transaction(['cards'],'readwrite'); const req=tx.objectStore('cards').put(card); req.onsuccess=()=>res(req.result); req.onerror=()=>rej(req.error); }); },
            delete: async (id) => { const db=await dbUtils.open(); return new Promise((res, rej)=>{ const tx=db.transaction(['cards'],'readwrite'); const req=tx.objectStore('cards').delete(id); req.onsuccess=()=>res(); req.onerror=()=>rej(req.error); }); },
            clear: async () => { const db=await dbUtils.open(); return new Promise((res, rej)=>{ const tx=db.transaction(['cards'],'readwrite'); const req=tx.objectStore('cards').clear(); req.onsuccess=()=>res(); req.onerror=()=>rej(req.error); }); }
        };

        class ErrorBoundary extends Component {
            constructor(p){super(p);this.state={hasError:false,error:null};} 
            static getDerivedStateFromError(err){return{hasError:true,error:err};}
            render(){ if(this.state.hasError)return e('div', {className: "h-screen flex flex-col items-center justify-center p-4 text-red-600"}, e('h3', null, 'App 發生錯誤'), e('p', {className: "text-xs mb-4"}, this.state.error?.message), e('button', {onClick:()=>{localStorage.clear();window.location.reload()}, className: "bg-gray-200 px-4 py-2 rounded"}, '重置並重整')); return this.props.children; }
        }

        const Icon = ({ name, size = 20, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (!ref.current || !window.lucide) return;
                const container = ref.current; container.innerHTML = '';
                const i = document.createElement('i'); i.setAttribute('data-lucide', name);
                if(className) { className.split(' ').forEach(cls => { if(cls) i.classList.add(cls); }); }
                container.appendChild(i);
                window.lucide.createIcons({ root: container, attrs: { width: size, height: size, class: className } });
            }, [name, size, className]);
            return e('span', { ref: ref, style: { display: 'inline-flex', alignItems: 'center' } });
        };

        const compressImage = (file) => new Promise((res,rej)=>{
            if(!file)return rej("No file"); const u=URL.createObjectURL(file); const i=new Image(); i.src=u;
            i.onload=()=>{ URL.revokeObjectURL(u); const c=document.createElement('canvas'); const m=1200; let w=i.width,h=i.height; if(w>h){if(w>m){h*=m/w;w=m;}}else{if(h>m){w*=m/h;h=m;}} c.width=w; c.height=h; const ctx=c.getContext('2d'); ctx.drawImage(i,0,0,w,h); res(c.toDataURL('image/jpeg',0.8)); }; i.onerror=rej;
        });

        const CameraScanner = ({onCapture,onCancel}) => {
            const vRef = useRef(null); const [error, setError] = useState(null);
            useEffect(()=>{ 
                let s = null; 
                const init = async () => {
                    try {
                        s = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment", width: { ideal: 1920 }, height: { ideal: 1080 }}});
                        if(vRef.current) { vRef.current.srcObject=s; vRef.current.play().catch(console.error); }
                    } catch(err) { setError("相機錯誤: "+err.message); }
                };
                init(); return ()=>s?.getTracks().forEach(t=>t.stop()); 
            },[]);
            const capture = () => { 
                if(!vRef.current)return; const v = vRef.current; const c = document.createElement("canvas"); 
                const videoRatio = v.videoWidth / v.videoHeight; const displayRatio = v.clientWidth / v.clientHeight;
                let sWidth = v.videoWidth, sHeight = v.videoHeight, sx = 0, sy = 0;
                if (videoRatio > displayRatio) { sWidth = v.videoHeight * displayRatio; sx = (v.videoWidth - sWidth) / 2; } 
                else { sHeight = v.videoWidth / displayRatio; sy = (v.videoHeight - sHeight) / 2; }
                const frameW = sWidth * 0.75, frameH = frameW / 1.6; const frameX = sx + (sWidth - frameW) / 2, frameY = sy + (sHeight - frameH) / 2;
                const MAX_DIM = 1200; let destW = frameW, destH = frameH;
                if (destW > MAX_DIM || destH > MAX_DIM) { const scale = Math.min(MAX_DIM / destW, MAX_DIM / destH); destW *= scale; destH *= scale; }
                c.width = destW; c.height = destH; c.getContext('2d').drawImage(v, frameX, frameY, frameW, frameH, 0, 0, destW, destH); 
                onCapture(c.toDataURL("image/jpeg",0.8)); 
            };
            return e('div', {className: "fixed inset-0 bg-black z-50 flex flex-col"},
                e('div', {className: "flex-1 relative overflow-hidden"},
                    e('video', {ref: vRef, playsInline: true, muted: true, autoPlay: true, className: "w-full h-full object-cover"}),
                    error && e('div', {className: "absolute inset-0 flex items-center justify-center text-white bg-black/80"}, error),
                    e('div', {className: "absolute inset-0 flex items-center justify-center pointer-events-none z-20"},
                        e('div', {className: "w-3/4 aspect-[1.6/1] border-2 border-blue-500 rounded-xl relative shadow-[0_0_0_999px_rgba(0,0,0,0.5)] overflow-hidden"},
                            e('div', {className: "scan-line"}),
                            e('div', {className: "absolute top-0 left-0 w-4 h-4 border-t-4 border-l-4 border-blue-500 -mt-1 -ml-1"}),
                            e('div', {className: "absolute top-0 right-0 w-4 h-4 border-t-4 border-r-4 border-blue-500 -mt-1 -mr-1"}),
                            e('div', {className: "absolute bottom-0 left-0 w-4 h-4 border-b-4 border-l-4 border-blue-500 -mb-1 -ml-1"}),
                            e('div', {className: "absolute bottom-0 right-0 w-4 h-4 border-b-4 border-r-4 border-blue-500 -mb-1 -mr-1"})
                        )
                    ),
                    e('div', {className: "absolute bottom-32 w-full text-center z-20"}, e('span', {className: "px-4 py-2 bg-black/50 text-white text-xs rounded-full"}, "請將名片放入框內"))
                ),
                e('div', {className: "absolute bottom-0 left-0 w-full h-32 flex items-center justify-center gap-12 pb-6 bg-black/80 z-50"},
                    e('button', {onClick: onCancel, className: "text-white font-bold p-4"}, "取消"),
                    e('button', {onClick: capture, className: "w-16 h-16 bg-white rounded-full border-4 border-gray-300 shadow-lg active:scale-95 transition-transform"}),
                    e('div', {className: "w-12"})
                )
            );
        };

        function App() {
            const [showSplash, setShowSplash] = useState(true); const [view, setView] = useState("home");
            const [cards, setCards] = useState([]); const [isLoadingDB, setIsLoadingDB] = useState(true);
            const [capturedImage, setCapturedImage] = useState(null); const [backImage, setBackImage] = useState(null); 
            const [currentAvatar, setCurrentAvatar] = useState(null); const [additionalImage, setAdditionalImage] = useState(null);
            const [isProcessing, setIsProcessing] = useState(false); const [resultData, setResultData] = useState({}); 
            const [currentCardId, setCurrentCardId] = useState(null); const [filterCategory, setFilterCategory] = useState("全部");
            const [searchQuery, setSearchQuery] = useState(""); const [apiKey, setApiKey] = useState("");
            const [selectedModel, setSelectedModel] = useState(""); const [availableModels, setAvailableModels] = useState([]);
            const [testStatus, setTestStatus] = useState("idle"); const [testMessage, setTestMessage] = useState("");
            const [statusMsg, setStatusMsg] = useState(""); const [error, setError] = useState(null);
            const randomInputName = useMemo(() => `s_${Math.random().toString(36).slice(2)}`, []);

            useEffect(() => { safeLocalStorage.removeItem("snapcard_api_key"); setTimeout(() => setShowSplash(false), 2000); }, []);
            useEffect(() => { const l=async()=>{ try{const d=await dbUtils.getAll(); setCards(sortCardsList(d));}catch(err){} }; l(); }, []);
            useEffect(() => { setTimeout(() => window.lucide?.createIcons(), 100); }, [view, cards, resultData]);

            const startScanFlow = () => { if (!apiKey) { setView("settings"); return; } setView("scan"); };
            const handleManualAdd = () => { setResultData({ category: "工作-客戶" }); setCapturedImage(null); setBackImage(null); setCurrentAvatar(null); setAdditionalImage(null); setCurrentCardId(null); setView("result"); };
            const handleManualEdit = (card) => { setResultData(card); setCapturedImage(card.image); setBackImage(card.backImage); setCurrentAvatar(card.avatar); setAdditionalImage(card.additionalImage); setCurrentCardId(card.id); setView("result"); };
            const handleImageUpload = async (ev, setter) => { if (ev.target.files[0]) { try { const b = await compressImage(ev.target.files[0]); setter(b); } catch(err) { alert("圖片處理失敗"); } } };
            const clearApiKey = () => { setApiKey(""); safeLocalStorage.removeItem("snapcard_api_key"); setTestStatus("idle"); setTestMessage(""); setAvailableModels([]); setSelectedModel(""); };
            const sanitizeKey = (k) => k.trim().replace(/[\r\n\s]/g, '');

            const getUsableModels = async (cleanKey) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models?key=${cleanKey}`;
                const res = await fetch(url, { method: 'GET' });
                if (!res.ok) { const err = await res.json().catch(()=>({})); throw new Error(`[${res.status}] ${err.error?.message || res.statusText}`); }
                const data = await res.json();
                const usable = data.models.filter(m => m.supportedGenerationMethods?.includes("generateContent") && m.name.includes("gemini") && !m.name.includes("1.5")).map(m => m.name.replace("models/", ""));
                return usable;
            };

            const fetchModelsAndTest = async () => {
                if(!apiKey) return setTestMessage("請輸入 Key");
                setTestStatus("testing"); setTestMessage("正在查詢您的授權模型...");
                try {
                    const cleanKey = sanitizeKey(apiKey); const usableModels = await getUsableModels(cleanKey);
                    setAvailableModels(usableModels); let bestModel = usableModels.find(m => m.includes("gemini-2.0")) || usableModels[0];
                    setSelectedModel(bestModel); setTestStatus("success"); setTestMessage(`驗證成功！已自動偵測最新模型：${bestModel}`);
                } catch(err) { setTestStatus("error"); setTestMessage(`失敗: ${err.message}`); }
            };

            // ⚡ 終極極速優化點：徹底移除盲測舊模型邏輯，開門見山「直接鎖定」gemini-2.0-flash！
            const analyze = async (base64) => {
                setIsProcessing(true); setError(null); setStatusMsg("AI 快速辨識中 (gemini-2.0)...");
                if (!apiKey) { setError("請先設定 API Key"); setView("settings"); setIsProcessing(false); return; }
                const cleanKey = sanitizeKey(apiKey);
                
                // 堅決排除任何舊版，直接鎖定 2.0-flash 作為首選，3.0-flash 作為唯一備份
                let chosenModel = selectedModel || "gemini-2.0-flash";
                let modelsToTry = [chosenModel, "gemini-3.0-flash"];

                let lastError = "", successJson = null;
                const prompt = `分析名片回傳JSON:{"name":"","jobTitle":"","company":"","mobile":"","tel":"","fax":"","email":"","address":"","category":"工作-客戶","note":""}。規則:1.分mobile/tel/fax 2.company合併中英 3.category[工作-客戶,工作-廠商,家人,朋友]。無Markdown。`;
                const imagePart = { inlineData: { mimeType: "image/jpeg", data: base64.split(',')[1] } };

                for (const model of modelsToTry) {
                    try {
                        const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${cleanKey}`;
                        const res = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, imagePart] }] }) });
                        
                        if (!res.ok) {
                            const err = await res.json().catch(()=>({})); const msg = err.error?.message || res.statusText;
                            if (res.status === 400 && (msg.includes("API key") || msg.includes("INVALID_ARGUMENT"))) throw new Error("API Key 無效");
                            lastError = `[${model}] 錯誤: ${msg}`; continue; 
                        }
                        
                        const json = await res.json(); let text = json.candidates?.[0]?.content?.parts?.[0]?.text;
                        if(!text) { lastError = "模型回傳空白內容"; continue; }
                        text = text.replace(/```json|```/g, '').trim(); const start = text.indexOf('{'), end = text.lastIndexOf('}');
                        successJson = JSON.parse(text.substring(start, end + 1)); break; 
                    } catch(err) { if (err.message.includes("API Key")) throw err; lastError = err.message; }
                }

                if (!successJson) {
                    setIsProcessing(false);
                    throw new Error(`連線失敗 (${lastError})`);
                }

                setResultData(successJson || { category: "工作-客戶" }); setBackImage(null); setAdditionalImage(null); setCurrentAvatar(null); setCurrentCardId(null); setView("result"); setIsProcessing(false);
            };

            const saveCard = async () => {
                const newData = { id: currentCardId || Date.now(), ...resultData, image: capturedImage, backImage: backImage, avatar: currentAvatar, additionalImage: additionalImage, category: resultData.category||"工作-客戶" };
                await dbUtils.put(newData); const d = await dbUtils.getAll(); setCards(sortCardsList(d)); setView("home");
            };
            const handleDeleteCard = async (id, ev) => { ev.stopPropagation(); if(confirm("刪除?")) { await dbUtils.delete(id); setCards(prev => prev.filter(c => c.id !== id)); } };
            const sortCardsList = (cardsArray) => {
                return [...cardsArray].sort((a, b) => {
                    const compA = (a.company || "").toString().toLowerCase(); const compB = (b.company || "").toString().toLowerCase();
                    if (compA < compB) return -1; if (compA > compB) return 1;
                    const nameA = (a.name || "").toString().toLowerCase(); const nameB = (b.name || "").toString().toLowerCase();
                    if (nameA < nameB) return -1; if (nameA > nameB) return 1;
                    return b.id - a.id;
                });
            };
            const downloadSingleVcf = () => {
                const card = resultData; let vcf = "BEGIN:VCARD\nVERSION:3.0\n"; let displayName = card.name || "未命名";
                if (card.company) displayName = `${card.company} ${displayName}`; vcf += `FN:${displayName}\nN:${displayName};;;;\n`;
                if (card.company) vcf += `ORG:${card.company};\n`; if (card.jobTitle) vcf += `TITLE:${card.jobTitle}\n`;
                if (card.mobile) vcf += `TEL;type=CELL:${card.mobile}\n`; if (card.tel) vcf += `TEL;type=WORK:${card.tel}\n`; if (card.fax) vcf += `TEL;type=FAX:${card.fax}\n`;
                if (card.email) vcf += `EMAIL;type=INTERNET;type=WORK:${card.email}\n`; if (card.address) vcf += `ADR;type=WORK:;;${card.address};;;;\n`;
                let notes = []; if (card.category) notes.push(`分類: ${card.category}`); if (card.note) notes.push(card.note); if (notes.length > 0) vcf += `NOTE:${notes.join(' | ')}\n`;
                vcf += "END:VCARD\n";
                const blob = new Blob([vcf], { type: 'text/vcard' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.download = `${displayName}.vcf`; a.href = url; document.body.appendChild(a); a.click(); document.body.removeChild(a);
            };
            const exportData = () => { const blob = new Blob([JSON.stringify(cards,null,2)], {type:"application/json"}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "snapcard_backup.json"; a.click(); };
            const handleImportBackup = (ev) => { 
                const file = ev.target.files[0]; if(!file) return; const r = new FileReader(); 
                r.onload=async(e)=> { try { const d = JSON.parse(e.target.result); for(const c of d) await dbUtils.put(c); const all = await dbUtils.getAll(); setCards(sortCardsList(all)); alert("匯入成功"); } catch(err){alert("格式錯誤");} };
                r.readAsText(file); ev.target.value=''; 
            };

            const baseModels = ["gemini-2.0-flash", "gemini-3.0-flash", "gemini-3.0-pro", "gemini-2.0-flash-exp"];
            const dropdownModels = [...new Set([...baseModels, ...availableModels])].filter(m => !m.includes("1.5"));

            if (showSplash) {
                return e('div', {className: "fixed inset-0 bg-[#1e3a8a] z-[9999] flex flex-col items-center justify-center", style: {background: 'linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%)'}},
                    e('div', {style: { width: '120px', height: '120px', marginBottom: '24px' }},
                        e('svg', {xmlns: "http://www.w3.org/2000/svg", viewBox: "0 0 512 512", fill: "none"},
                            e('rect', {x: "86", y: "156", width: "340", height: "200", rx: "20", fill: "white"}),
                            e('circle', {cx: "160", cy: "256", r: "35", fill: "#e2e8f0"}),
                            e('rect', {x: "230", y: "240", width: "140", height: "16", rx: "4", fill: "#94a3b8"}),
                            e('rect', {x: "230", y: "270", width: "100", height: "12", rx: "3", fill: "#cbd5e1"}),
                            e('rect', {x: "86", y: "156", width: "340", height: "16", fill: "#f97316", opacity: "0.8"},
                                e('animate', {attributeName: "y", values: "156;340;156", dur: "2s", repeatCount: "indefinite", calcMode: "spline", keySplines: "0.45 0 0.55 1; 0.45 0 0.55 1"})
                            )
                        )
                    ),
                    e('h1', {style: {fontSize: '32px', fontWeight: '900', color: 'white', fontFamily: 'sans-serif', letterSpacing: '1px'}}, "SnapCard"),
                    e('p', {style: {fontSize: '14px', color: '#cbd5e1', fontFamily: 'sans-serif', marginTop: '12px', letterSpacing: '2px', fontWeight: 300}}, "每一次相遇都值得期待")
                );
            }

            return e('div', {className: "max-w-md mx-auto h-screen bg-gray-50 flex flex-col font-sans border-x border-gray-200 relative"},
                e('header', {className: "px-6 pt-12 pb-4 bg-white shadow-sm flex justify-between items-center z-10"},
                    e('h1', {className: "text-xl font-black text-blue-600 tracking-tighter"}, "SNAPCARD"),
                    e('button', {onClick: () => setView("settings")}, e(Icon, {name: "settings", className: "text-gray-400"}))
                ),
                e('main', {className: "flex-1 overflow-y-auto p-4 relative"},
                    error && e('div', {className: "bg-red-100 text-red-600 p-3 rounded-lg mb-4 text-xs font-bold break-all"}, error),
                    
                    view === "home" && e('div', {className: "space-y-4"},
                        !apiKey && e('div', {onClick:()=>setView("settings"), className: "bg-blue-50 p-4 rounded-xl text-blue-600 text-center text-sm font-bold cursor-pointer animate-pulse"}, "👉 請先設定 API Key"),
                        e('div', {className: "relative"},
                            e('div', {className: "absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"}, e(Icon, {name: "search", size: 16})),
